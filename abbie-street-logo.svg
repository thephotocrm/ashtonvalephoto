<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="#1a1a1a"/>

  <!-- Decorative ring -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#c9a962" stroke-width="1.5"/>

  <!-- Monogram letters -->
  <text x="200" y="215" font-family="Georgia, Times, serif" font-size="120" font-weight="400" fill="#c9a962" text-anchor="middle" letter-spacing="-5">
    AS
  </text>

  <!-- Tagline -->
  <text x="200" y="280" font-family="Georgia, Times, serif" font-size="18" fill="#e8e8e8" text-anchor="middle" letter-spacing="8">
    PHOTO &amp; VIDEO
  </text>

  <!-- Top decorative text -->
  <text x="200" y="145" font-family="Georgia, Times, serif" font-size="14" fill="#e8e8e8" text-anchor="middle" letter-spacing="6">
    ABBIE STREET
  </text>

  <!-- Small decorative lines -->
  <line x1="120" y1="158" x2="160" y2="158" stroke="#c9a962" stroke-width="1"/>
  <line x1="240" y1="158" x2="280" y2="158" stroke="#c9a962" stroke-width="1"/>
  <line x1="140" y1="262" x2="170" y2="262" stroke="#c9a962" stroke-width="1"/>
  <line x1="230" y1="262" x2="260" y2="262" stroke="#c9a962" stroke-width="1"/>
</svg>